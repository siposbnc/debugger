name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check + build
        run: npm run build
      - name: Card-offer distribution assertions
        run: |
          npx esbuild scripts/offerTest.ts --bundle --platform=node --outfile=scripts/offerTest.cjs
          node scripts/offerTest.cjs
      - name: Sim smoke run (ada / greenfield / 5 min)
        run: |
          npx esbuild scripts/simulate.ts --bundle --platform=node --outfile=scripts/simulate.cjs
          node scripts/simulate.cjs ada greenfield 5
